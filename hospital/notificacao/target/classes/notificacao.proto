syntax = "proto3";

package notificacao;

option java_multiple_files = true;
option java_package = "br.com.fiap.hospital.notificacao";

service Notificacao {
    rpc Enviar (NotificacaoRequest) returns (NotificacaoResponse);
}

message NotificacaoRequest {
    string categoria = 1;
    string titulo = 2;
    string mensagem = 3;
    string nome = 4;
    string email = 5;
    string tell = 6;
}

message NotificacaoResponse {
    string idMensagem = 1;
    string categoria = 2;
    string titulo = 3;
    string mensagem = 4;
    string nome = 5;
    string email = 6;
    string tell = 7;
}