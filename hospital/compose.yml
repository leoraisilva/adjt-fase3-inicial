services:
  procpag:
    image: docker.io/erickemprobr/procpag:latest 
    ports: 
    - "8089:8089"
    networks:
    - fase3net
  
  # adicione os seus outros serviços aqui
  # faça com que todos os serviços usem a mesma rede 'fase3net'

  db:
    image: postgres:15
    container_name: hospital_tech
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospital_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:	
      - fase3net
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fase3net
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fase3net
  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - fase3net
  usuario:
    build:
      context: .
      dockerfile: usuario/Dockerfile
    container_name: usuario
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - db
      - kafka
    networks:
      - fase3net

  agendamento:
    build:
      context: .
      dockerfile: agendamento/Dockerfile
    container_name: agendamento
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - db
      - kafka
    networks:
      - fase3net

  triagem:
    build:
      context: .
      dockerfile: triagem/Dockerfile
    container_name: triagem
    ports:
      - "8084:8084"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - db
      - kafka
    networks:
      - fase3net

  historico:
    build:
      context: .
      dockerfile: historico/Dockerfile
    container_name: historico
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - db
      - kafka
    networks:
      - fase3net

  notificacao:
    build:
      context: .
      dockerfile: notificacao/Dockerfile
    container_name: notificacao
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - db
      - kafka
    networks:
      - fase3net
networks:
  fase3net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
